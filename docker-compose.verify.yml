services:
  postgres:
    image: postgres:15
    container_name: aether-verify-postgres
    environment:
      POSTGRES_DB: aether
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - verify_postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-15432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aether-verify-redis
    command: redis-server --appendonly no --save "" --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app.local
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    image: aether-verify-app:latest
    container_name: aether-verify-app
    env_file:
      - .env.verify
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/aether
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      TZ: Asia/Shanghai
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-18084}:80"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  verify_postgres_data:
